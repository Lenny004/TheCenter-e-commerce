<section class="dashboard container">
  <header class="dashboard__header">
    <div>
      <img class="dashboard__brand-logo" src="assets/brand-location.svg" alt="Logo de marca">
      <h1>Dashboard</h1>
    </div>
    <div class="dashboard__actions">
      <a routerLink="/perfil" class="dash-btn dash-btn--icon" aria-label="Ir al perfil">
        <span class="material-symbols-outlined">person</span>
      </a>
      <a routerLink="/carrito" class="dash-btn dash-btn--icon" aria-label="Ir al carrito">
        <span class="material-symbols-outlined">shopping_cart</span>
      </a>
    </div>
  </header>

  <nav class="dashboard__tabs" aria-label="Categorías">
    <button type="button" class="dash-tab dash-tab--active">Todos los productos</button>
    <button type="button" class="dash-tab">Zapatillas</button>
    <button type="button" class="dash-tab">Accesorios</button>
    <button type="button" class="dash-tab">Oferta flash</button>
    <button type="button" class="dash-tab">Más vendidos</button>
  </nav>

  <div class="dashboard__grid">
    <article class="dashboard-card">
      <img src="assets/home/product-1.jpg" alt="Zapatillas Swift Glide">
      <div class="dashboard-card__body">
        <h3>Zapatillas Swift Glide</h3>
        <p>89,99 €</p>
        <a routerLink="/catalogo" class="dash-btn dash-btn--primary">Ver en catálogo</a>
      </div>
    </article>

    <article class="dashboard-card">
      <img src="assets/home/product-2.jpg" alt="Reloj Aura">
      <div class="dashboard-card__body">
        <h3>Reloj Aura</h3>
        <p>159,00 €</p>
        <a routerLink="/catalogo" class="dash-btn dash-btn--primary">Ver en catálogo</a>
      </div>
    </article>

    <article class="dashboard-card">
      <img src="assets/home/product-3.jpg" alt="PureAudio Elite">
      <div class="dashboard-card__body">
        <h3>PureAudio Elite</h3>
        <p>299,99 €</p>
        <a routerLink="/catalogo" class="dash-btn dash-btn--primary">Ver en catálogo</a>
      </div>
    </article>

    <article class="dashboard-card">
      <img src="assets/home/product-4.jpg" alt="Mochila Nomad Leather">
      <div class="dashboard-card__body">
        <h3>Mochila Nomad Leather</h3>
        <p>124,50 €</p>
        <a routerLink="/catalogo" class="dash-btn dash-btn--primary">Ver en catálogo</a>
      </div>
    </article>
  </div>

  <nav class="dashboard__bottom" aria-label="Navegación principal">
    <a routerLink="/dashboard" class="bottom-link bottom-link--active">
      <span class="material-symbols-outlined">home</span>
      <span>Inicio</span>
    </a>
    <a routerLink="/catalogo" class="bottom-link">
      <span class="material-symbols-outlined">search</span>
      <span>Buscar</span>
    </a>
    <a routerLink="/perfil" class="bottom-link">
      <span class="material-symbols-outlined">person</span>
      <span>Perfil</span>
    </a>
    <a routerLink="/carrito" class="bottom-link">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span>Carrito</span>
    </a>
  </nav>
</section>
