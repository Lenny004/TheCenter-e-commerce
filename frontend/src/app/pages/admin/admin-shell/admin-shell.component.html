<div class="admin-shell">
  <button
    type="button"
    class="admin-shell__menu-toggle"
    (click)="toggleNav()"
    [attr.aria-expanded]="navOpen"
    aria-controls="admin-nav"
    aria-label="Abrir o cerrar menú de administración"
  >
    <span class="material-symbols-outlined">menu</span>
  </button>

  @if (navOpen) {
    <div class="admin-shell__scrim" (click)="closeNav()" aria-hidden="true"></div>
  }

  <aside
    id="admin-nav"
    class="admin-shell__sidebar"
    [class.admin-shell__sidebar--open]="navOpen"
  >
    <div class="admin-shell__brand">
      <img src="assets/brand-location.svg" alt="" class="admin-shell__logo" width="32" height="32" />
      <div>
        <p class="admin-shell__kicker">The Center</p>
        <p class="admin-shell__title">{{ auth.isVendor() ? 'Panel vendedor' : 'Administración' }}</p>
      </div>
    </div>

    <nav class="admin-shell__nav" aria-label="Secciones de administración">
      <a
        routerLink="/admin"
        routerLinkActive="admin-shell__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="admin-shell__link"
        (click)="closeNav()"
      >
        <span class="material-symbols-outlined" aria-hidden="true">dashboard</span>
        Resumen
      </a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/categorias" routerLinkActive="admin-shell__link--active" class="admin-shell__link" (click)="closeNav()">
          <span class="material-symbols-outlined" aria-hidden="true">category</span>
          Categorías
        </a>
        <a routerLink="/admin/tallas" routerLinkActive="admin-shell__link--active" class="admin-shell__link" (click)="closeNav()">
          <span class="material-symbols-outlined" aria-hidden="true">straighten</span>
          Tallas
        </a>
      }
      <a routerLink="/admin/productos" routerLinkActive="admin-shell__link--active" class="admin-shell__link" (click)="closeNav()">
        <span class="material-symbols-outlined" aria-hidden="true">inventory_2</span>
        Productos
      </a>
      <a routerLink="/admin/pedidos" routerLinkActive="admin-shell__link--active" class="admin-shell__link" (click)="closeNav()">
        <span class="material-symbols-outlined" aria-hidden="true">local_shipping</span>
        Pedidos
      </a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/usuarios" routerLinkActive="admin-shell__link--active" class="admin-shell__link" (click)="closeNav()">
          <span class="material-symbols-outlined" aria-hidden="true">group</span>
          Usuarios
        </a>
      }
    </nav>

    <a routerLink="/" class="admin-shell__back" (click)="closeNav()">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      Volver al sitio
    </a>
  </aside>

  <div class="admin-shell__content">
    <router-outlet />
  </div>
</div>
