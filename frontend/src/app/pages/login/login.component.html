<section class="login">
  <div class="login__card">
    <div class="login__topbar">
      <a class="icon-button" routerLink="/" aria-label="Volver al inicio">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
    </div>

    <div class="login__brand">
      <div class="login__logo" aria-hidden="true">
        <img class="login__logo-image" src="assets/brand-location.svg" alt="Logo de marca">
      </div>
      <h1 class="login__title">Iniciar sesión</h1>
    </div>

    @if (successMsg) {
      <div class="login__success" role="status">{{ successMsg }}</div>
    }
    @if (errorMsg) {
      <div class="login__error" role="alert">{{ errorMsg }}</div>
    }

    <form class="login__form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="login-email">Correo electrónico</label>
        <input id="login-email" type="email" [(ngModel)]="email" name="email"
               placeholder="tu@email.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input id="login-password" type="password" [(ngModel)]="password" name="password"
               placeholder="Tu contraseña" required>
      </div>
      <button type="submit" class="btn-primary" [disabled]="submitting">
        {{ submitting ? 'Entrando…' : 'Iniciar sesión' }}
      </button>
    </form>

    <div class="login__separator" aria-hidden="true">
      <span>o</span>
    </div>

    <label class="login__keep">
      <input type="checkbox">
      <span>Mantener sesión iniciada</span>
    </label>

    <p class="login__register">
      ¿No tienes cuenta? <a routerLink="/registro">Crear una</a>
    </p>
  </div>
</section>
