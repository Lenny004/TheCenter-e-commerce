<section class="login">
  <div class="login__card">
    <div class="login__topbar">
      <a class="icon-button" routerLink="/" aria-label="Volver al inicio">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
    </div>

    <div class="login__brand">
      <div class="login__logo" aria-hidden="true">
        <img class="login__logo-image" src="assets/brand-location.svg" alt="Logo de marca">
      </div>
      <h1 class="login__title">Sign in or create account</h1>
    </div>

    <p class="login__legal">
      By continuing, you agree to our
      <a href="#">Terms of Use</a>
      and
      <a href="#">Privacy Policy</a>.
    </p>

    <form class="login__form">
      <label class="sr-only" for="login-user">Email or mobile phone</label>
      <input id="login-user" type="text" placeholder="Email or mobile phone" required>
      <button type="submit" class="btn-primary">Continue</button>
    </form>

    <div class="login__separator" aria-hidden="true">
      <span>o</span>
    </div>

    <label class="login__keep">
      <input type="checkbox">
      <span>Keep me signed in</span>
    </label>

    <button type="button" class="login__help">Need help signing in?</button>

    <p class="login__register">
      Don’t have an account? <a routerLink="/registro">Create one</a>
    </p>
  </div>
</section>
