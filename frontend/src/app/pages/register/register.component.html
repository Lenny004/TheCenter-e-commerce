<section class="register">
  <div class="register__card">
    <h1>Crear Cuenta</h1>
    <p>Regístrate para empezar a comprar en The Center.</p>

    @if (errorMsg) {
      <div class="register__error">{{ errorMsg }}</div>
    }

    <form class="register__form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nombre completo *</label>
        <input type="text" id="name" [(ngModel)]="name" name="name"
               placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="tu&#64;email.com" required>
      </div>
      <div class="form-group">
        <label for="phone">Teléfono</label>
        <input type="tel" id="phone" [(ngModel)]="phone" name="phone"
               placeholder="+503 0000-0000">
      </div>
      <div class="form-group">
        <label for="password">Contraseña *</label>
        <input type="password" id="password" [(ngModel)]="password" name="password"
               placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña *</label>
        <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
               placeholder="Repite tu contraseña" required>
      </div>
      <div class="form-group">
        <label for="rol">Tipo de cuenta *</label>
        <select id="rol" [(ngModel)]="rol" name="rol" required>
          <option value="cliente">Cliente</option>
          <option value="vendedor">Vendedor</option>
        </select>
      </div>
      <button type="submit" class="btn-primary register__submit" [disabled]="submitting">
        {{ submitting ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="register__login">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
