<!-- ============================================================================
     The Center — Layout principal de la aplicación
     ============================================================================ -->

<header class="header">
  <div class="header__container container">
    <a class="header__logo" routerLink="/" aria-label="Inicio">
      <img src="assets/brand-location.svg" alt="Logo de marca">
    </a>
    <nav class="header__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/carrito" routerLinkActive="active">
        <span class="material-symbols-outlined">shopping_cart</span>
      </a>
      @if (showPrivateAreaLink()) {
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">Admin</a>
      }
      <a routerLink="/login" routerLinkActive="active">Entrar</a>
    </nav>
  </div>
</header>

<main class="main">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <div class="footer__container container">
    <p>&copy; 2026 The Center — Todos los derechos reservados.</p>
  </div>
</footer>
