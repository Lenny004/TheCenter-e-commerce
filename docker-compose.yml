version: "3.9"

services:
  # ── Base de datos PostgreSQL ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: the-center-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: the_center
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Backend (Node.js + Express) ─────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: the-center-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/the_center
      PORT: 5000
    depends_on:
      - db
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ── Frontend (Angular) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: the-center-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
    restart: unless-stopped

volumes:
  db-data:
